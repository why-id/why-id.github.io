<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harga Emas RealTime by LulzSecID</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary: #00ff88;
            --danger: #ff4d4d;
            --warning: #ffcc00;
            --secondary: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'PT Sans', sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center;
        }

        .container { 
            width: 100%; 
            max-width: 1200px; 
            transition: filter 0.3s ease; /* Tambahan untuk animasi blur yang halus */
        }

        /* Tambahan class CSS khusus untuk efek blur */
        .container.blur-active {
            filter: blur(8px) brightness(0.6);
            pointer-events: none;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--secondary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-size: 0.95rem;
            background: rgba(0, 255, 136, 0.1);
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            font-weight: 700;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; 
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 25px; 
            border-radius: 16px;
            border: 1px solid #ffffff;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-card:hover { 
            transform: translateY(-5px); 
            border-color: #4b5563;
        }

        .stat-icon {
            font-size: 2.5rem;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        .stat-info { flex: 1; }
        .stat-label { color: var(--text-dim); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: 700; margin: 8px 0; color: #ffffff; }
        
        .trend-container {
            font-size: 0.85rem; 
            display: flex; 
            flex-direction: column; 
            gap: 4px;
        }
        .trend-text { color: var(--text-dim); }
        .trend { display: inline-flex; align-items: center; gap: 4px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
        .trend.up { color: var(--primary); background: rgba(0, 255, 136, 0.1); }
        .trend.down { color: var(--danger); background: rgba(255, 77, 77, 0.1); }

        @media (max-width: 900px) { 
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }

        /* Floating AI Assistant */
        .ai-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            
            border: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 1000;
        }
        .ai-fab:hover {
            transform: scale(1.1);
            
        }

        .ai-panel {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            background: #0d1117;
            border: 1px solid var(--primary);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Hidden by default */
            flex-direction: column;
            z-index: 999;
            overflow: hidden;
        }
        .ai-panel.active {
            display: flex;
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-header {
            background: #161b22;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--secondary);
            font-weight: 700;
            color: var(--primary);
        }
        .ai-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
        }
        .ai-close:hover { color: var(--danger); }

        .ai-body {
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .api-key-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .api-key-container input {
            padding: 10px;
            background: #161b22;
            border: 1px solid var(--secondary);
            color: white;
            border-radius: 8px;
            font-family: inherit;
        }
        .api-key-container input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-action {
            padding: 10px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .btn-action:hover { opacity: 0.8; }
        .btn-action:disabled { background: var(--secondary); color: var(--text-dim); cursor: not-allowed; }

        .ai-response {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 255, 136, 0.05);
            border: 0px solid var(--primary);
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.5;
            display: none;
            white-space: pre-wrap;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-title">
            Harga Emas Bitcoin dan Dollar 
        </div>
        <div class="live-indicator">
            <div class="dot"></div>
            <span id="realtime"></span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="bi bi-database stat-icon" style="color: var(--warning);"></i>
            <div class="stat-info">
                <div class="stat-label">Emas (Per Gram)</div>
                <div class="stat-value" id="price-gold">Memuat...</div>
                <div class="trend-container">
                    <span class="trend-text" id="desc-gold">Status Emas: Menunggu data...</span>
                    <span class="trend" id="trend-gold"><i class="bi bi-dash"></i> 0.00%</span>
                </div>
            </div>
        </div>
        
        <div class="stat-card">
            <i class="bi bi-currency-bitcoin stat-icon" style="color: var(--warning);"></i>
            <div class="stat-info">
                <div class="stat-label">Bitcoin (BTC/IDR)</div>
                <div class="stat-value" id="price-btc">Memuat...</div>
                <div class="trend-container">
                    <span class="trend-text" id="desc-btc">Status Bitcoin: Menunggu data...</span>
                    <span class="trend" id="trend-btc"><i class="bi bi-dash"></i> 0.00%</span>
                </div>
            </div>
        </div>
        
        <div class="stat-card">
            <i class="bi bi-currency-dollar stat-icon" style="color: var(--warning);"></i>
            <div class="stat-info">
                <div class="stat-label">US Dollar (USD/IDR)</div>
                <div class="stat-value" id="price-usd">Memuat...</div>
                <div class="trend-container">
                    <span class="trend-text" id="desc-usd">Status Dollar: Menunggu data...</span>
                    <span class="trend" id="trend-usd"><i class="bi bi-dash"></i> 0.00%</span>
                </div>
            </div>
        </div>
    </div>

    
</div>

<button class="ai-fab" onclick="toggleAIPanel()" title="Bantuan AI">
    <i class="bi bi-headset"></i>
</button>

<div class="ai-panel" id="aiPanel">
    <div class="ai-header">
        <span><i class="bi bi-question-circle"></i> Bantuan AI</span>
        <button class="ai-close" onclick="toggleAIPanel()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="ai-body">
        <div class="api-key-container" id="apiKeySection">
            <label style="font-size: 0.9rem; color: var(--text-dim);">Masukkan OpenAI API Key :</label>
            <input type="password" id="apiKeyInput" placeholder="xxxxxxxxxxxx">
            <button class="btn-action" onclick="saveApiKey()">Connect</button>
        </div>

        <div id="aiActionSection" style="display: none;">
            <p style="font-size: 0.9rem; margin-bottom: 15px; color: var(--text-dim);">
                Mode <strong style="color: var(--primary);">AI LulzSec</strong>.
            </p>
            <button class="btn-action" id="btnAskAI" style="width: 100%;" onclick="getAIAdvice()">Bantuan</button>
            <div class="ai-response" id="aiResponseBox"></div>
        </div>
    </div>
</div>

<script>
function updateTanggal() {
  const sekarang = new Date();

  const opsi = {
    weekday: 'long',
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  };

  const format = sekarang.toLocaleDateString('id-ID', opsi);
  document.getElementById('realtime').textContent = format;
}

// jalankan pertama kali
updateTanggal();

// update tiap detik (opsional)
setInterval(updateTanggal, 1000);

    // Variabel Harga dalam Rupiah
    let btcIdr = 0, goldGramIdr = 0, usdIdr = 15500; 
    let lastBtcIdr = 0, lastGoldGramIdr = 0, lastUsdIdr = 15500;
    
    // Simulasi Base Harga Emas Dunia (USD per Troy Ounce)
    let baseGoldUsdOunce = 2350.00; 
    
    // Variabel OpenAI
    let apiKey = "";

    // ==========================================
    // 1. FUNGSI UPDATE DATA LIVE
    // ==========================================
    function formatRupiah(num) {
        return "Rp " + Math.round(num).toLocaleString('id-ID');
    }

    function updateTrendUI(assetName, elTrendId, elDescId, current, last) {
        const elTrend = document.getElementById(elTrendId);
        const elDesc = document.getElementById(elDescId);
        
        if(!last || last === 0) last = current;

        const diff = ((current - last) / last) * 100;
        
        if(diff > 0.001) {
            elTrend.className = "trend up";
            elTrend.innerHTML = `<i class="bi bi-arrow-up-right"></i> +${diff.toFixed(3)}%`;
            elDesc.innerHTML = `Kenaikan ${assetName}: Harga Menguat`;
        } else if (diff < -0.001) {
            elTrend.className = "trend down";
            elTrend.innerHTML = `<i class="bi bi-arrow-down-right"></i> ${diff.toFixed(3)}%`;
            elDesc.innerHTML = `Penurunan ${assetName}: Harga Terkoreksi`;
        } else {
            elTrend.className = "trend";
            elTrend.innerHTML = `<i class="bi bi-dash"></i> Stabil`;
            elDesc.innerHTML = `Status ${assetName}: Harga Stabil`;
        }
    }

    async function fetchMarketData() {
        try {
            // 1. Fetch Kurs USD to IDR
            const fiatRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const fiatData = await fiatRes.json();
            
            lastUsdIdr = usdIdr;
            usdIdr = fiatData.rates.IDR;

            // 2. Fetch BTC in USD, convert to IDR
            const btcRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            const btcData = await btcRes.json();
            
            lastBtcIdr = btcIdr || (parseFloat(btcData.price) * usdIdr);
            btcIdr = parseFloat(btcData.price) * usdIdr;

            // 3. Kalkulasi Emas (Simulasi pergerakan realtime)
            baseGoldUsdOunce = baseGoldUsdOunce + (Math.random() * 4 - 2);
            const goldUsdPerGram = baseGoldUsdOunce / 31.1035;
            
            lastGoldGramIdr = goldGramIdr || (goldUsdPerGram * usdIdr);
            goldGramIdr = goldUsdPerGram * usdIdr;

            // Update UI Angka
            document.getElementById('price-gold').innerText = formatRupiah(goldGramIdr);
            document.getElementById('price-btc').innerText = formatRupiah(btcIdr);
            document.getElementById('price-usd').innerText = formatRupiah(usdIdr);

            // Update UI Tren
            updateTrendUI("Emas", 'trend-gold', 'desc-gold', goldGramIdr, lastGoldGramIdr);
            updateTrendUI("Bitcoin", 'trend-btc', 'desc-btc', btcIdr, lastBtcIdr);
            updateTrendUI("Dollar", 'trend-usd', 'desc-usd', usdIdr, lastUsdIdr);

        } catch (err) {
            console.log("Gagal fetch market:", err);
        }
    }

    // ==========================================
    // 2. FUNGSI UI FLOATING AI & OPENAI
    // ==========================================
    function toggleAIPanel() {
        const panel = document.getElementById('aiPanel');
        const container = document.querySelector('.container'); // Mengambil div container
        
        panel.classList.toggle('active');
        container.classList.toggle('blur-active'); // Mengaktifkan/mematikan blur
    }

    function saveApiKey() {
        const input = document.getElementById('apiKeyInput').value.trim();
        if(input) {
            apiKey = input;
            document.getElementById('apiKeySection').style.display = 'none';
            document.getElementById('aiActionSection').style.display = 'block';
        } else {
            alert('Silakan masukkan API Key yang valid.');
        }
    }

    async function getAIAdvice() {
        if (!apiKey) {
            alert("API Key belum disetel.");
            return;
        }

        const btn = document.getElementById('btnAskAI');
        const responseBox = document.getElementById('aiResponseBox');
        
        btn.disabled = true;
        btn.innerText = "Bantuan lagi?";
        responseBox.style.display = 'block';
        responseBox.innerHTML = 'Silahkan tunggu ...';

        const promptText = `Anda adalah ahli investasi emas di Indonesia. Harga emas saat ini adalah ${formatRupiah(goldGramIdr)} per gram (format: Rp xxx.xxx/gram). Target pengguna adalah pemula dengan modal kecil (1–5 juta rupiah) dan tujuan investasi aman. Tugas Anda: sebutkan harga emas hari ini dalam Rupiah per gram, berikan keputusan tegas apakah sebaiknya BELI sekarang, JUAL sekarang, atau TAHAN dulu, jelaskan alasan sederhana apakah harga sedang naik, turun, atau stabil serta faktor ekonomi singkat yang mempengaruhi, berikan strategi jelas (jika BELI bagaimana cara beli, jika JUAL kapan waktu jual, jika TAHAN apa yang harus ditunggu), lalu berikan 1 tips penting agar pemula tidak rugi. Gunakan bahasa sangat sederhana, langsung ke inti, dan fokus membantu pengguna mengambil keputusan.`;
        
        const messages = [{ role: "user", content: promptText }];

        try {
            // Kode API yang disesuaikan
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST", 
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${apiKey}` 
                },
                body: JSON.stringify({ 
                    model: "gpt-4o-mini", 
                    messages: messages, 
                    temperature: 0.9 
                })
            });

            const data = await response.json();

            if(data.error) {
                throw new Error(data.error.message);
            }

            if(data.choices && data.choices.length > 0) {
                const aiReply = data.choices[0].message.content;
                responseBox.innerHTML = `<strong>Saran AI:</strong>\n${aiReply}`;
            }

        } catch (error) {
            responseBox.innerHTML = `<span style="color: var(--danger);"><i class="bi bi-exclamation-triangle"></i> Terjadi kesalahan: ${error.message}</span>`;
            // Tampilkan kembali form input jika API invalid
            if (error.message.includes('API key')) {
                document.getElementById('apiKeySection').style.display = 'flex';
                document.getElementById('aiActionSection').style.display = 'none';
                apiKey = ""; 
            }
        } finally {
            btn.disabled = false;
            btn.innerText = "Bantuan lagi?";
        }
    }

    // ==========================================
    // 3. INISIALISASI
    // ==========================================
    fetchMarketData();
    setInterval(fetchMarketData, 15000); // Update market tiap 15 detik

</script>

</body>
</html>
