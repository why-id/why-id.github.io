<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp iOS by 𝘓𝘰𝘦𝘭𝘻𝘚𝘦𝘤</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Helvetica Neue", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    /* ── Wallpaper wrapper ── */
    .wallpaper-wrap {
      position: relative;
      width: 390px;
      min-height: 700px;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.1s; /* Efek flash screenshot */
    }
    .wallpaper-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .status-left {
      display: flex;
      align-items: center;
    }
    .signal-icon {
      width: 17px;
      height: 11px;
      margin-right: 5px;
    }
    .wifi-icon {
      width: 16px;
      height: 12px;
      margin-right: 6px;
    }
    .wallpaper-blur {
      position: absolute;
      inset: 0;
      z-index: 1;
      backdrop-filter: blur(4px) brightness(0.55);
      -webkit-backdrop-filter: blur(4px) brightness(0.55);
      background: rgba(0, 0, 0, 0.32);
    }
    /* ── Status Bar iOS ── */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      z-index: 10;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .status-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .status-right {
      display: flex;
      align-items: center;
    }
    .battery-icon {
      width: 25px;
      height: 12px;
      margin-left: 6px;
    }
    /* ── Content layer ── */
    .content {
      position: relative;
 z-index: 2;
      width: 100%;
      max-width: 360px;
      padding: 28px 14px 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }
    /* ── Reaction bar ── */
    .reaction-bar {
      background: rgba(30, 30, 35, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 7px 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      border: 0px solid rgba(255, 255, 255, 0.15);
      align-self: flex-start;
    }
    .reaction-bar img.emoji-btn {
      width: 30px;
      height: 30px;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.12s;
      display: inline-block;
    }
    .reaction-bar img.emoji-btn:active {
      transform: scale(1.3);
    }
    .reaction-divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.18);
      margin: 0 3px;
    }
    .plus-btn {
      width: 30px;
      height: 30px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }
    .plus-btn svg {
      width: 18px;
      height: 18px;
      color: rgba(255, 255, 255, 0.8);
    }
    /* ── Chat bubble ── */
    .bubble-wrap {
      max-width: 78%;
      align-self: flex-start;
    }
    .bubble {
      background: #262628;
      border-radius: 16px 16px 16px 3px;
      padding: 10px 13px 8px;
    }
    .bubble-text {
      color: #ffffff;
      font-size: 15px;
      line-height: 1.45;
      margin: 0 0 4px;
      word-break: break-word;
      white-space: pre-wrap;
      outline: none;
    }
    .bubble-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }
    .bubble-time {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
    }
    /* ── Context menu ── */
    .context-menu {
      background: rgba(24, 24, 27, 0.93);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 18px;
      overflow: hidden;
      width: 100%;
      border: 0px solid rgba(255, 255, 255, 0.10);
    }
    .menu-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 18px;
      border-bottom: 0.3px solid rgba(255, 255, 255, 0.09);
      cursor: pointer;
      transition: background 0.12s;
    }
    .menu-row:last-child {
      border-bottom: none;
    }
    .menu-row:active {
      background: rgba(255, 255, 255, 0.08);
    }
    .menu-row span {
      font-size: 15.5px;
      font-weight: 400;
      color: #ffffff;
    }
    .menu-row svg {
      width: 20px;
      height: 20px;
      color: rgba(255, 255, 255, 0.85);
    }
    .menu-row.delete span {
      color: #ff375f;
    }
    .menu-row.delete svg {
      color: #ff375f;
    }
    .menu-row.delete:active {
      background: rgba(255, 55, 95, 0.1);
    }
    /* Utilitas Editable */
    .editable-inline {
      outline: none;
      min-width: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="wallpaper-wrap" id="capture-area">

      <div class="status-right">

            fill="white"
          />
          <path
            d="M12.5 7.5C11.4 6.4 9.9 5.8 8.5 5.8C7.1 5.8 5.6 6.4 4.5 7.5"
            stroke="white"
            stroke-width="1.5"

          <path

            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
        <span class="editable-inline" contenteditable="true" spellcheck="false">83%</span>
        <svg
          class="battery-icon"
          viewBox="0 0 25 12"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect
            x="0.5"
            y="0.5"
            width="21"
            height="11"
            rx="3.5"
            stroke="white"

          />
          <path
            d="M24 4V8C24 8 25 8 25 6C25 4 24 4 24 4Z"

            fill-opacity="0.5"
          />
          <rect x="2" y="2" width="15" height="8" rx="2" fill="white" />
        </svg>
      </div>
    </div>
    <div class="content">
      <div class="reaction-bar">
        <img id="e1" class="emoji-btn" alt="👍" />
        <img id="e2" class="emoji-btn" alt="❤️" />
        <img id="e3" class="emoji-btn" alt="😂" />
        <img id="e4" class="emoji-btn" alt="😮" />
        <img id="e5" class="emoji-btn" alt="😢" />
        <img id="e6" class="emoji-btn" alt="🙏" />
      </div>
      <div class="bubble-wrap">
        <div class="bubble">
          <p class="bubble-text" contenteditable="true" spellcheck="false">dibuat oleh LoelzSec 🔥</p>
          <div class="bubble-meta">
            <span class="bubble-time">15.46</span>
          </div>
        </div>
      </div>
      <div class="context-menu">
        <div class="menu-row">
          <span>Balas</span>
          <svg

        </div>
        <div class="menu-row">
          <span>Teruskan</span>
          <svg
            viewBox="0 0 24 24"

            fill="none"
          >
            <path
              d="M15 14l5-5-5-5"
              stroke-linecap="round"

            ></path>
            <path
              d="M20 9H9.5C6.46 9 4 11.46 4 14.5v0C4 17.54 6.46 20 9.5 20H13"

        <div class="menu-row">
          <span>Salin</span>

            <rect

        </div>
        <div class="menu-row">
          <span>Beri bintang</span>
          <svg
            viewBox="0 0 24 24"

          >
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"

  <script>
    // --- SKRIP EMOJI APPLE UNTUK REACTION BAR ---
    const APPLE_EMOJI_JSON_URL =
      "https://media.githubusercontent.com/media/Ditzzx-vibecoder/entahlah/main/emoji-apple.json";

    function emojiToUnicode(emoji) {
      return [...emoji].map((c) => c.codePointAt(0).toString(16)).join("-");
    }

    async function loadAppleEmojis() {
      try {
        const res = await fetch(APPLE_EMOJI_JSON_URL);
        const map = await res.json();

        ["e1", "e2", "e3", "e4", "e5", "e6"].forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          const em = el.getAttribute("alt");
          if (!em) return;

          const base = emojiToUnicode(em);
          const variants = [
            base,
            base.replace(/-fe0f/g, ""),
            base.toUpperCase(),
            base.replace(/-fe0f/g, "").toUpperCase(),
          ];

          let b64 = null;
          for (const v of variants) {
            if (map[v]) {
              b64 = map[v];
              break;
            }
          }

          if (b64) {
            el.src = "data:image/png;base64," + b64;
          } else {
            const codes = [...em]
              .map((c) => c.codePointAt(0).toString(16).padStart(4, "0"))
              .filter((x) => x !== "fe0f");
            el.src = `https://cdn.jsdelivr.net/npm/emoji-datasource-apple@15.0.1/img/apple/64/${codes.join(
              "-"
            )}.png`;
          }
        });
      } catch (err) {
        ["e1", "e2", "e3", "e4", "e5", "e6"].forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          const em = el.getAttribute("alt");
          const codes = [...em]
            .map((c) => c.codePointAt(0).toString(16).padStart(4, "0"))
            .filter((x) => x !== "fe0f");
          el.src = `https://cdn.jsdelivr.net/npm/emoji-datasource-apple@15.0.1/img/apple/64/${codes.join(
            "-"
          )}.png`;
        });
      }
    }
    loadAppleEmojis();


    // --- JAM REALTIME ---
    function updateClock() {
      const timeElement = document.querySelector(".bubble-time");
      const statusBarTime = document.getElementById("status-time");
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");
      if (timeElement) timeElement.textContent = `${hours}.${minutes}`;
      if (statusBarTime) statusBarTime.textContent = `${hours}:${minutes}`;
    }
    updateClock();
    setInterval(updateClock, 1000);


    // --- KONVERSI EMOJI DALAM BUBBLE CHAT ---
    function convertEmojisInChat() {
      const bubble = document.querySelector('.bubble-text');
      if(!bubble) return;
      
      const walker = document.createTreeWalker(bubble, NodeFilter.SHOW_TEXT, null, false);
      const nodesToReplace = [];
      let n;
      while (n = walker.nextNode()) {
        if (n.parentNode.tagName === 'IMG') continue;
        nodesToReplace.push(n);
      }

      nodesToReplace.forEach(textNode => {
        const text = textNode.nodeValue;
        const emojiRegex = /([\p{Emoji_Presentation}\p{Extended_Pictographic}])/gu;
        if (emojiRegex.test(text)) {
          const span = document.createElement('span');
          span.innerHTML = text.replace(emojiRegex, match => {
            const codes = [...match].map(c => c.codePointAt(0).toString(16).padStart(4, "0")).filter(x => x !== "fe0f");
            const url = `https://cdn.jsdelivr.net/npm/emoji-datasource-apple@15.0.1/img/apple/64/${codes.join("-")}.png`;
            return `<img src="${url}" style="width: 20px; height: 20px; vertical-align: text-bottom; display: inline-block; margin: 0 1px;" alt="${match}" />`;
          });
          textNode.parentNode.replaceChild(span, textNode);
        }
      });
    }

    convertEmojisInChat();
    const chatBubbleText = document.querySelector('.bubble-text');
    chatBubbleText.addEventListener('blur', convertEmojisInChat);


    // --- FITUR LONG PRESS UNTUK SCREENSHOT (POJOK KANVAS TRANSPARAN) ---
    const captureArea = document.getElementById('capture-area');
    let pressTimer;

    const startPress = (e) => {
      if (e.target.isContentEditable) return; 
      
      pressTimer = window.setTimeout(() => {
        takeScreenshot();
      }, 1000);
    };

    const cancelPress = () => {
      clearTimeout(pressTimer);
    };

    captureArea.addEventListener('mousedown', startPress);
    captureArea.addEventListener('touchstart', startPress, {passive: true});
    captureArea.addEventListener('mouseup', cancelPress);
    captureArea.addEventListener('mouseleave', cancelPress);
    captureArea.addEventListener('touchend', cancelPress);
    captureArea.addEventListener('touchcancel', cancelPress);

    function takeScreenshot() {
      // Efek kilatan kamera (Flash)
      captureArea.style.opacity = '0.4';
      setTimeout(() => { captureArea.style.opacity = '1'; }, 100);

      // Konfigurasi html-to-image dengan background null agar area luar border-radius menjadi transparan murni (.png)
      htmlToImage.toPng(captureArea, {
        pixelRatio: 3, // Kualitas HD Ultra Jernih
        backgroundColor: null, // MENGHILANGKAN POJOKAN PUTIH (Membuat kanvas pembungkus menjadi transparan penuh)
        style: {
          borderRadius: '0px' // Mengunci bentuk sudut layar HP agar rapi
        }
      })
      .then(function (dataUrl) {
        const link = document.createElement('a');
        link.download = 'whatsapp_ios_context_menu.png';
        link.href = dataUrl;
        link.click();
      })
      .catch(function (error) {
        console.error('Gagal mengambil screenshot:', error);
      });
    }
  </script>
</body>
