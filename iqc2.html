<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp iOS Dark – Context Menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Wallpaper wrapper ── */
    .wallpaper-wrap {
      position: relative;
      width: 390px;
      min-height: 700px;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wallpaper-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .status-left {
      display: flex;
      align-items: center;
    }

    .signal-icon {
      width: 17px;
      height: 11px;
      margin-right: 5px; /* Jarak antara ikon sinyal dan teks operator */
    }

    .wifi-icon {
      width: 16px;
      height: 12px;
      margin-right: 6px; /* Jarak antara ikon Wi-Fi dan Baterai */
    }

    .wallpaper-blur {
      position: absolute;
      inset: 0;
      z-index: 1;
      backdrop-filter: blur(6px) brightness(0.45);
      -webkit-backdrop-filter: blur(6px) brightness(0.45);
      background: rgba(0, 0, 0, 0.32);
    }

    /* ── Status Bar iOS ── */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      z-index: 10;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .status-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .status-right {
      display: flex;
      align-items: center;
    }

    .battery-icon {
      width: 25px;
      height: 12px;
      margin-left: 6px;
    }

    /* ── Content layer ── */
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 360px;
      padding: 28px 14px 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    /* ── Reaction bar ── */
    .reaction-bar {
      background: rgba(30, 30, 35, 0.90);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 7px 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      border: 0px solid rgba(255, 255, 255, 0.15);
      align-self: flex-start;
    }

    .reaction-bar img.emoji-btn {
      width: 30px;
      height: 30px;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.12s;
      display: inline-block;
    }

    .reaction-bar img.emoji-btn:active { transform: scale(1.3); }

    .reaction-divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.18);
      margin: 0 3px;
    }

    .plus-btn {
      width: 30px;
      height: 30px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }

    .plus-btn svg {
      width: 18px;
      height: 18px;
      color: rgba(255, 255, 255, 0.80);
    }

    /* ── Chat bubble ── */
    .bubble-wrap {
      max-width: 78%;
      align-self: flex-start;
    }

    .bubble {
      background: #262628;
      border-radius: 16px 16px 16px 3px;
      padding: 10px 13px 8px;
    }

    .bubble-text {
      color: #ffffff;
      font-size: 15px;
      line-height: 1.45;
      margin: 0 0 4px;
      word-break: break-word;
      white-space: pre-wrap;
      outline: none;
    }

    .bubble-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .bubble-time {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
    }

    /* ── Context menu ── */
    .context-menu {
      background: rgba(24, 24, 27, 0.93);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 18px;
      overflow: hidden;
      width: 100%;
      border: 0px solid rgba(255, 255, 255, 0.10);
    }

    .menu-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 18px;
      border-bottom: 0.3px solid rgba(255, 255, 255, 0.09);
      cursor: pointer;
      transition: background 0.12s;
    }

    .menu-row:last-child { border-bottom: none; }
    .menu-row:active { background: rgba(255, 255, 255, 0.08); }

    .menu-row span {
      font-size: 15.5px;
      font-weight: 400;
      color: #ffffff;
    }

    .menu-row svg {
      width: 20px;
      height: 20px;
      color: rgba(255, 255, 255, 0.85);
    }

    .menu-row.delete span { color: #ff375f; }
    .menu-row.delete svg   { color: #ff375f; }
    .menu-row.delete:active { background: rgba(255, 55, 95, 0.10); }
  </style>
</head>
<body>

  <div class="wallpaper-wrap">

    <img
      class="wallpaper-img"
      src="https://raw.githubusercontent.com/why-id/why-id.github.io/refs/heads/main/img_0136.png"
      alt=""
    />

    <div class="wallpaper-blur"></div>

    <div class="status-bar">
          <div class="status-left">
      <svg class="signal-icon" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect y="8" width="3" height="4" rx="1" fill="white"/>
        <rect x="5" y="5.5" width="3" height="6.5" rx="1" fill="white"/>
        <rect x="10" y="3" width="3" height="9" rx="1" fill="white"/>
        <rect x="15" y="0" width="3" height="12" rx="1" fill="white"/>
      </svg>
      Tsel LTE
    </div>

      <div class="status-center" id="status-time">--:--</div>
          <div class="status-right">
      <svg class="wifi-icon" viewBox="0 0 17 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.5 12C9.32843 12 10 11.3284 10 10.5C10 9.67157 9.32843 9 8.5 9C7.67157 9 7 9.67157 7 10.5C7 11.3284 7.67157 12 8.5 12Z" fill="white"/>
        <path d="M12.5 7.5C11.4 6.4 9.9 5.8 8.5 5.8C7.1 5.8 5.6 6.4 4.5 7.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M16 4C14.1 2.1 11.4 1 8.5 1C5.6 1 2.9 2.1 1 4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      83%
      <svg class="battery-icon" viewBox="0 0 25 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-width="1" stroke-opacity="0.5"/>
        <path d="M24 4V8C24 8 25 8 25 6C25 4 24 4 24 4Z" fill="white" fill-opacity="0.5"/>
        <rect x="2" y="2" width="15" height="8" rx="2" fill="white"/>
      </svg>
    </div>

    </div>

    <div class="content">

      <div class="reaction-bar">
        <img id="e1" class="emoji-btn" alt="👍" />
        <img id="e2" class="emoji-btn" alt="❤️" />
        <img id="e3" class="emoji-btn" alt="😂" />
        <img id="e4" class="emoji-btn" alt="😮" />
        <img id="e5" class="emoji-btn" alt="🔥" />
        <img id="e6" class="emoji-btn" alt="🙏" />
      </div>

      <div class="bubble-wrap">
        <div class="bubble">
          <p class="bubble-text" contenteditable="true" spellcheck="false">Klik disini untuk mengubah pesan.</p>
          <div class="bubble-meta">
            <span class="bubble-time">15.46</span>
          </div>
        </div>
      </div>

      <div class="context-menu">

        <div class="menu-row">
          <span>Balas</span>
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
            <path d="M9 14L4 9l5-5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M4 9h10.5c3.04 0 5.5 2.46 5.5 5.5v0c0 3.04-2.46 5.5-5.5 5.5H11" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>

        <div class="menu-row">
          <span>Teruskan</span>
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
            <path d="M15 14l5-5-5-5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M20 9H9.5C6.46 9 4 11.46 4 14.5v0C4 17.54 6.46 20 9.5 20H13" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>

        <div class="menu-row">
          <span>Salin</span>
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
            <rect x="9" y="9" width="11" height="11" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>

        <div class="menu-row">
          <span>Beri bintang</span>
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke-linecap="round" stroke-linejoin="round"></polygon>
          </svg>
        </div>

        <div class="menu-row">
          <span>Laporkan</span>
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke-linecap="round" stroke-linejoin="round"></path>
            <line x1="12" y1="9" x2="12" y2="13" stroke-linecap="round" stroke-linejoin="round"></line>
            <line x1="12" y1="17" x2="12.01" y2="17" stroke-linecap="round" stroke-linejoin="round"></line>
          </svg>
        </div>

        <div class="menu-row delete">
          <span>Hapus</span>
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" fill="none">
            <polyline points="3 6 5 6 21 6" stroke-linecap="round" stroke-linejoin="round"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>

      </div>
    </div>
  </div>

  <script>
    // Load Apple emoji images from CDN
    const emojiMap = [
      ['e1', '🔥'],
      ['e2', '😭'],
      ['e3', '😂'],
      ['e4', '😮'],
      ['e5', '😢'],
      ['e6', '🤬'],
    ];

    emojiMap.forEach(([id, em]) => {
      const el = document.getElementById(id);
      if (!el) return;
      const codes = [...em]
        .map(c => c.codePointAt(0).toString(16).padStart(4, '0'))
        .filter(x => x !== 'fe0f');
      const code = codes.join('-');
      el.src = `https://cdn.jsdelivr.net/npm/emoji-datasource-apple@15.0.1/img/apple/64/${code}.png`;
      el.onerror = () => { el.style.display = 'none'; };
    });

    // Realtime Clock Update
    function updateClock() {
      const timeElement = document.querySelector('.bubble-time');
      const statusBarTime = document.getElementById('status-time');
      
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      if (timeElement) timeElement.textContent = `${hours}.${minutes}`;
      // iOS Status bar time usually uses a colon
      if (statusBarTime) statusBarTime.textContent = `${hours}:${minutes}`;
    }

    // Jalankan fungsi pertama kali
    updateClock();
    // Update waktu setiap 1 detik
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
