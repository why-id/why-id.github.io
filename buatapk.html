<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML → APK Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        };
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        .alert-enter { transform: translateY(-100%); opacity: 0; }
        .alert-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .alert-exit { transform: translateY(0); opacity: 1; }
        .alert-exit-active { transform: translateY(-100%); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 h-screen flex overflow-hidden">
    <div id="alertContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80"></div>

    <div class="w-[320px] bg-gray-800 p-5 overflow-y-auto flex flex-col gap-4 shadow-xl z-10 border-r border-gray-700">
        <h2 class="text-xl font-bold flex items-center gap-2 mb-1 text-white">
            <i class="bi bi-android2 text-green-500"></i> HTML → APK
        </h2>

        <div class="flex rounded-lg overflow-hidden bg-gray-900 border border-gray-700">
            <button class="flex-1 py-2 text-center text-xs font-medium focus:outline-none transition-colors tab-btn active bg-green-600 text-white" onclick="switchTab(0, this)">
                <i class="bi bi-file-earmark-code mr-1"></i> HTML
            </button>
            <button class="flex-1 py-2 text-center text-xs font-medium focus:outline-none transition-colors tab-btn text-gray-400 hover:text-white hover:bg-gray-700" onclick="switchTab(1, this)">
                <i class="bi bi-globe mr-1"></i> URL
            </button>
        </div>

        <div>
            <label class="block text-xs text-gray-400 mb-1">App Name</label>
            <input id="appName" placeholder="Nama aplikasi" class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-green-500 transition-colors">
        </div>

        <div>
            <label class="block text-xs text-gray-400 mb-1">Package Name</label>
            <input id="packageName" placeholder="com.nama.app" class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-green-500 transition-colors">
        </div>

        <div id="htmlSection" class="section-content block">
            <label class="block text-xs text-gray-400 mb-1">Upload HTML</label>
            <input type="file" id="htmlFile" accept=".html" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs text-white file:mr-3 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-gray-700 file:text-gray-300 hover:file:bg-gray-600 transition-colors mb-3">
            <button onclick="previewHTML()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium py-2 rounded-md transition-colors flex items-center justify-center gap-2">
                <i class="bi bi-eye"></i> Preview HTML
            </button>
        </div>

        <div id="urlSection" class="section-content hidden">
            <label class="block text-xs text-gray-400 mb-1">Website URL</label>
            <input id="siteUrl" placeholder="https://website.com" class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-green-500 transition-colors mb-3">
            <button onclick="previewURL()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium py-2 rounded-md transition-colors flex items-center justify-center gap-2">
                <i class="bi bi-eye"></i> Preview Website
            </button>
        </div>

        <button onclick="generate()" class="w-full bg-green-600 hover:bg-green-500 text-white text-sm font-bold py-2.5 rounded-md mt-2 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-green-900/20">
            <i class="bi bi-box-arrow-down"></i> Generate APK Project
        </button>
    </div>

    <div class="flex-1 bg-black flex flex-col relative">
        <div id="previewEmpty" class="absolute inset-0 flex items-center justify-center text-gray-700 flex-col gap-3">
            <i class="bi bi-phone text-5xl"></i>
            <p class="text-sm">Area Preview</p>
        </div>
        <iframe id="previewFrame" class="w-full h-full border-none bg-white relative z-10" style="display: none;"></iframe>
    </div>

    <script>
        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            const alertEl = document.createElement('div');
            
            const isError = type === 'error';
            // Bootstrap-style alert colors using Tailwind (Dark mode optimized)
            const bgClass = isError ? 'bg-[#2c0b0e] border-[#842029] text-[#ea868f]' : 'bg-[#051b11] border-[#0f5132] text-[#75b798]';
            const iconClass = isError ? 'bi-exclamation-triangle-fill text-[#ea868f]' : 'bi-check-circle-fill text-[#75b798]';
            
            alertEl.className = `flex items-center gap-3 p-3.5 mb-2 border rounded-md shadow-lg ${bgClass} alert-enter alert-enter-active text-sm`;
            alertEl.innerHTML = `<i class="bi ${iconClass} text-lg"></i> <div>${message}</div>`;
            
            container.appendChild(alertEl);
            
            setTimeout(() => {
                alertEl.classList.remove('alert-enter-active');
                alertEl.classList.add('alert-exit-active');
                setTimeout(() => alertEl.remove(), 300);
            }, 3000);
        }

        function switchTab(index, btn) {
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-green-600', 'text-white');
                el.classList.add('text-gray-400');
            });
            btn.classList.remove('text-gray-400');
            btn.classList.add('bg-green-600', 'text-white');
            
            document.querySelectorAll('.section-content').forEach(el => el.classList.add('hidden'));
            if (index === 0) {
                document.getElementById('htmlSection').classList.remove('hidden');
                document.getElementById('htmlSection').classList.add('block');
            } else {
                document.getElementById('urlSection').classList.remove('hidden');
                document.getElementById('urlSection').classList.add('block');
            }
        }

        function showPreview() {
            document.getElementById('previewEmpty').style.display = 'none';
            document.getElementById('previewFrame').style.display = 'block';
        }

        function previewURL() {
            const url = document.getElementById("siteUrl").value;
            if (!url) {
                showAlert("Masukkan URL website terlebih dahulu!", "error");
                return;
            }
            document.getElementById("previewFrame").src = url;
            showPreview();
        }

        function previewHTML() {
            const file = document.getElementById("htmlFile").files[0];
            if (!file) {
                showAlert("Upload file HTML terlebih dahulu!", "error");
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById("previewFrame").srcdoc = e.target.result;
                showPreview();
            };
            reader.readAsText(file);
        }

        function encodeBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        async function generate() {
            const appName = document.getElementById("appName").value;
            const packageName = document.getElementById("packageName").value;
            const htmlFile = document.getElementById("htmlFile").files[0];
            const url = document.getElementById("siteUrl").value;
            
            if (!appName || !packageName) {
                showAlert("Mohon isi App Name dan Package Name!", "error");
                return;
            }
            
            let loadCode = "";
            
            if (htmlFile && !document.getElementById('htmlSection').classList.contains('hidden')) {
                const html = await htmlFile.text();
                const encoded = encodeBase64(html);
                loadCode = `
        String html = new String(android.util.Base64.decode("${encoded}", android.util.Base64.DEFAULT));
        web.loadDataWithBaseURL(null, html, "text/html", "UTF-8", null);`;
            } else if (url && !document.getElementById('urlSection').classList.contains('hidden')) {
                loadCode = `web.loadUrl("${url}");`;
            } else {
                showAlert("Pilih HTML atau URL dan lengkapi datanya!", "error");
                return;
            }
            
            try {
                const zip = new JSZip();
                zip.file("README.txt", "Open project di Android Studio lalu Build APK.");
                
                zip.file("app/src/main/java/MainActivity.java", `
package ${packageName};
import android.os.Bundle;
import android.webkit.WebView;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    WebView web;
    @Override
    protected void onCreate(Bundle savedInstanceState){
        super.onCreate(savedInstanceState);
        web = new WebView(this);
        setContentView(web);
        web.getSettings().setJavaScriptEnabled(true);
        ${loadCode}
    }
}
`);
                
                zip.file("app/src/main/AndroidManifest.xml", `
<manifest package="${packageName}" xmlns:android="http://schemas.android.com/apk/res/android">
    <application android:label="${appName}" android:theme="@android:style/Theme.NoTitleBar">
        <activity android:name=".MainActivity" android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
`);
                
                const blob = await zip.generateAsync({type: "blob"});
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `${appName.replace(/\s+/g, '_')}_project.zip`;
                a.click();
                
                showAlert("Project berhasil dibuat dan didownload!", "success");
            } catch (error) {
                showAlert("Terjadi kesalahan saat memproses file.", "error");
                console.error(error);
            }
        }
    </script>
</body>
</html>
